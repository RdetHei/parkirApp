<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <pattern id="batik" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 8c2-3 6-3 8 0s6 3 8 0" fill="none" stroke="rgba(245,158,11,0.55)" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M0 4c2-3 6-3 8 0s6 3 8 0" fill="none" stroke="rgba(16,185,129,0.30)" stroke-width="1.1" stroke-linecap="round"/>
      <path d="M8 0v16M0 8h16" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.062
                0 0 0 0 0.726
                0 0 0 0 0.506
                0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#batik)" opacity="0.9"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="rgba(16,185,129,0.06)"/>

  <path d="M18 46V18h7l14 18V18h7v28h-7L25 28v18h-7Z" fill="#020617" opacity="0.92"/>
  <path d="M18 46V18h7l14 18V18h7v28h-7L25 28v18h-7Z" fill="url(#batik)" filter="url(#softGlow)"/>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
</svg>
